<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -300 974 865" width="974" height="865"
     font-family="'Courier New',ui-monospace,monospace">
  <!-- =============================================================
       CompileBless · 混合模式（底圖 974x517）
       底圖：assets/base.png（體素爐 + CODE MERIT 箱，data URI 內嵌）
       疊加層（純 SVG 動畫）：計數看板 / 線香 + 煙霧 / +1 Merit -1 Bug 飄字
       佔位符：{base_image} {merit_count} {blessed_line} {blessed_by} {blessed_at}

       viewBox 往上多留 210px、往下多留 40px，讓煙霧與飄字有空間飄升。
       ── 座標校準區 ──────────────────────────────
       線香/煙霧群組 : 對準香爐爐口（爐灰中心 ≈ x257, y90）
       +1/-1 群組    : 對準功德箱上方（箱中心 ≈ x773）
       ============================================================= -->
  <defs>
    <radialGradient id="ember" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#fff2b0"/>
      <stop offset="0.5" stop-color="#ff8c2b"/>
      <stop offset="1" stop-color="#c23b0e"/>
    </radialGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a1a4a"/>
      <stop offset="1" stop-color="#160c2c"/>
    </linearGradient>
    <style>
      @keyframes rise {
        0%   { transform: translateY(0);     opacity: 0.8; }
        100% { transform: translateY(-95px); opacity: 0;   }
      }
      @keyframes sway {
        0%   { transform: translateX(-5px); }
        50%  { transform: translateX(5px);  }
        100% { transform: translateX(-5px); }
      }
      @keyframes ember {
        0%, 100% { opacity: 1;   }
        50%      { opacity: 0.4; }
      }
      @keyframes floatUp {
        0%   { transform: translateY(0);     opacity: 0;   }
        12%  { opacity: 1;   }
        80%  { opacity: 0.9; }
        100% { transform: translateY(-95px); opacity: 0;   }
      }
      @keyframes glow {
        0%, 100% { opacity: 1;   }
        50%      { opacity: 0.7; }
      }
      .rise  { animation: rise 4.4s linear infinite; }
      .sway  { animation: sway 2.6s ease-in-out infinite; }
      .s2    { animation-delay: 1.5s; }
      .s3    { animation-delay: 3s;   }
      .ember { animation: ember 0.9s ease-in-out infinite; }
      .float { animation: floatUp 4s ease-out infinite; }
      .f2    { animation-delay: 2s; }
      .glow  { animation: glow 2.4s ease-in-out infinite; }
      .pix   { font-weight: bold; letter-spacing: 1px; }
      .pix2  { font-weight: bold; letter-spacing: 2px; }
    </style>
  </defs>

  <!-- ========================= 底圖 ========================= -->
  <image href="{base_image}" x="0" y="0" width="974" height="517"/>

  <!-- ========================= 計數看板 ========================= -->
  <g>
    <rect x="227" y="-288" width="520" height="100" rx="12" fill="url(#sky)" stroke="#f1c40f" stroke-width="5"/>
    <text x="487" y="-250" text-anchor="middle" class="pix" font-size="33" fill="#e8d8ff">今日全球工程師已累積功德</text>
    <text x="487" y="-202" text-anchor="middle" class="pix2 glow" font-size="44" fill="#ffd24d">✦ {merit_count} ✦</text>
  </g>

  <!-- ============================================================
       線香 + 煙霧（插在香爐爐口，爐灰中心 ≈ x257, y90）
       ============================================================ -->
  <g transform="translate(34,0)">
    <!-- 煙霧（3 條，錯開時間） -->
    <g transform="translate(230,-118)">
      <g class="rise"><g class="sway">
        <rect x="-4" y="-8"  width="9" height="9" fill="#d4d4d4"/>
        <rect x="3"  y="-20" width="9" height="9" fill="#c4c4c4"/>
        <rect x="-5" y="-32" width="9" height="9" fill="#b6b6b6"/>
        <rect x="3"  y="-44" width="9" height="9" fill="#aaaaaa"/>
      </g></g>
    </g>
    <g transform="translate(257,-132)">
      <g class="rise s2"><g class="sway">
        <rect x="-4" y="-8"  width="9" height="9" fill="#d8d8d8"/>
        <rect x="4"  y="-20" width="9" height="9" fill="#c8c8c8"/>
        <rect x="-5" y="-32" width="9" height="9" fill="#b8b8b8"/>
        <rect x="4"  y="-44" width="9" height="9" fill="#acacac"/>
      </g></g>
    </g>
    <g transform="translate(284,-118)">
      <g class="rise s3"><g class="sway">
        <rect x="-4" y="-8"  width="9" height="9" fill="#d4d4d4"/>
        <rect x="-3" y="-20" width="9" height="9" fill="#c4c4c4"/>
        <rect x="4"  y="-32" width="9" height="9" fill="#b6b6b6"/>
        <rect x="-3" y="-44" width="9" height="9" fill="#aaaaaa"/>
      </g></g>
    </g>

    <!-- 線香（暗紅長條 + 焦黑頂 + 火星） -->
    <g>
      <rect x="226" y="-110" width="9" height="215" fill="#6f2020"/>
      <rect x="226" y="-110" width="3" height="215" fill="#8f3232"/>
      <rect x="253" y="-124" width="9" height="229" fill="#6f2020"/>
      <rect x="253" y="-124" width="3" height="229" fill="#8f3232"/>
      <rect x="280" y="-110" width="9" height="215" fill="#6f2020"/>
      <rect x="280" y="-110" width="3" height="215" fill="#8f3232"/>
      <!-- 焦黑燒過的頂端 -->
      <rect x="226" y="-118" width="9" height="9" fill="#231414"/>
      <rect x="253" y="-132" width="9" height="9" fill="#231414"/>
      <rect x="280" y="-118" width="9" height="9" fill="#231414"/>
      <!-- 火星 -->
      <rect x="225" y="-124" width="11" height="11" rx="2" fill="url(#ember)" class="ember"/>
      <rect x="252" y="-138" width="11" height="11" rx="2" fill="url(#ember)" class="ember s2"/>
      <rect x="279" y="-124" width="11" height="11" rx="2" fill="url(#ember)" class="ember s3"/>
    </g>
  </g>

  <!-- ============================================================
       +1 Merit / -1 Bug 飄字（功德箱上方，箱中心 ≈ x773）
       ============================================================ -->
  <g transform="translate(773,-24)">
    <text x="0" y="0" text-anchor="middle" class="pix2 float"    font-size="44" fill="#55e06a">+1 Merit</text>
    <text x="0" y="0" text-anchor="middle" class="pix2 float f2" font-size="44" fill="#8be69a">-1 Bug</text>
  </g>

  <!-- ========================= 底部題字 ========================= -->
  <text x="487" y="550" text-anchor="middle" class="pix" font-size="30" fill="#7a5cff">{blessed_line}</text>
</svg>
